name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0). Overrides version in pyproject.toml."
        required: true
        type: string
      repository:
        description: "Target repository"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  build-and-publish:
    name: Build and publish to ${{ inputs.repository }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.repository }}
      url: ${{ inputs.repository == 'pypi' && format('https://pypi.org/project/pygeodetics/{0}', inputs.version) || format('https://test.pypi.org/project/pygeodetics/{0}', inputs.version) }}
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([abrc]+[0-9]+|\.dev[0-9]+|\.post[0-9]+)?$ ]]; then
            echo "Invalid version format: ${{ inputs.version }}"
            echo "Expected PEP 440 style version, e.g. 0.2.0, 1.0.0a1, 1.0.0.dev1"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build tomli tomli-w

      - name: Override version in pyproject.toml
        run: |
          python - <<'EOF'
          import os
          import tomli
          import tomli_w

          version = os.environ["INPUT_VERSION"]
          with open("pyproject.toml", "rb") as f:
              data = tomli.load(f)
          data["project"]["version"] = version
          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(data, f)
          print(f"pyproject.toml version set to {version}")
          EOF
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
